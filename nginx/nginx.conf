user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limit login/auth zone (per-IP token bucket)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # General API rate limit (per-IP) to blunt scraping / brute-force across all endpoints.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;

    # ---- TLS / HTTPS ----
    # Production MUST terminate TLS. Once certs are mounted, enable the redirect +
    # 443 server block below (HSTS is only meaningful over HTTPS):
    #
    #   server { listen 80; server_name _; return 301 https://$host$request_uri; }
    #   server {
    #       listen 443 ssl http2;
    #       ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #       ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #       ssl_protocols TLSv1.2 TLSv1.3;
    #       ... (move the location blocks below here) ...
    #   }

    server {
        listen 80;
        server_name localhost;

        # ---- Security headers (applied to all responses) ----
        # Prevent clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;
        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;
        # Control referrer information leakage
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Restrict features (camera, mic, geo, USB)
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # HSTS — force HTTPS once we're behind TLS (1 year, include subdomains)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Body size limit — matches the app-layer 50MB upload cap.
        client_max_body_size 50m;

        # Backend API Routing
        location /api/ {
            # General per-IP rate limit on the whole API surface.
            limit_req zone=api_limit burst=40 nodelay;
            # Auth endpoints get an additional nginx-level rate limit
            location ~ ^/api/auth/(login|forgot-password|reset-password) {
                limit_req zone=auth_limit burst=5 nodelay;
                proxy_pass http://api:3003;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            proxy_pass http://api:3003/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend Dashboard Routing
        location / {
            proxy_pass http://web:5001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
