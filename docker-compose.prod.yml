version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wpcc-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-wp_control_center}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - wpcc-network

  redis:
    image: redis:7-alpine
    container_name: wpcc-redis-prod
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required in production}"]
    networks:
      - wpcc-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wpcc-api-prod
    environment:
      PORT: ${API_PORT:-3003}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      AGENT_ENCRYPTION_KEY: ${AGENT_ENCRYPTION_KEY:?AGENT_ENCRYPTION_KEY is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - postgres
      - redis
    networks:
      - wpcc-network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: wpcc-worker-prod
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      AGENT_ENCRYPTION_KEY: ${AGENT_ENCRYPTION_KEY:?AGENT_ENCRYPTION_KEY is required}
    depends_on:
      - postgres
      - redis
    networks:
      - wpcc-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost/api}"
    container_name: wpcc-web-prod
    environment:
      PORT: ${WEB_PORT:-5001}
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost/api}"
    depends_on:
      - api
    networks:
      - wpcc-network

  nginx:
    image: nginx:alpine
    container_name: wpcc-nginx-prod
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - wpcc-network

volumes:
  postgres_prod_data:

networks:
  wpcc-network:
    driver: bridge
