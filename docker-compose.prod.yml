version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wpcc-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: wp_control_center
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - wpcc-network

  redis:
    image: redis:7-alpine
    container_name: wpcc-redis-prod
    networks:
      - wpcc-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wpcc-api-prod
    environment:
      PORT: 3003
      DATABASE_URL: "postgresql://postgres:SecretPassword123!@postgres:5432/wp_control_center?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: "prod-jwt-secret-key-change-this"
      AGENT_ENCRYPTION_KEY: "6a66632c253d82a17cb0b51de38e8cb554c8651a24d852a35368a5436d4f9bf3"
    depends_on:
      - postgres
      - redis
    networks:
      - wpcc-network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: wpcc-worker-prod
    environment:
      DATABASE_URL: "postgresql://postgres:SecretPassword123!@postgres:5432/wp_control_center?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AGENT_ENCRYPTION_KEY: "6a66632c253d82a17cb0b51de38e8cb554c8651a24d852a35368a5436d4f9bf3"
    depends_on:
      - postgres
      - redis
    networks:
      - wpcc-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost/api"
    container_name: wpcc-web-prod
    environment:
      PORT: 5001
      NEXT_PUBLIC_API_URL: "http://localhost/api"
    depends_on:
      - api
    networks:
      - wpcc-network

  nginx:
    image: nginx:alpine
    container_name: wpcc-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - wpcc-network

volumes:
  postgres_prod_data:

networks:
  wpcc-network:
    driver: bridge
