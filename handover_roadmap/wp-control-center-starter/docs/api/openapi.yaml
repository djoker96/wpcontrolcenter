          type: string
        siteId:
          type: string
        versionInstalled:
          type: string
        versionLatest:
          type: string
          nullable: true
        updateAvailable:
          type: boolean
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
    Job:
      type: object
