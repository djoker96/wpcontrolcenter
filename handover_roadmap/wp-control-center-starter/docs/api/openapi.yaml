components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
    SiteId:
      name: id
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Unauthorized
  schemas:
    UserRole:
      type: string
      enum: [SUPER_ADMIN, ADMIN, OPERATOR, VIEWER]
    EnvironmentType:
      type: string
      enum: [PRODUCTION, STAGING, DEVELOPMENT]
    SiteStatus:
      type: string
      enum: [ACTIVE, DISABLED, ARCHIVED]
    ConnectionStatus:
      type: string
      enum: [PENDING, CONNECTED, DISCONNECTED, ERROR]
    JobStatus:
      type: string
      enum: [QUEUED, RUNNING, SUCCESS, FAILED, CANCELED, TIMED_OUT]
    JobType:
      type: string
      enum:
        - REGISTER_SITE
        - RESYNC_SITE
        - SYNC_SYSTEM_INFO
        - SYNC_PLUGINS
        - SYNC_THEMES
        - SYNC_CORE
        - UPDATE_CORE
        - UPDATE_PLUGIN
        - UPDATE_THEME
        - ACTIVATE_PLUGIN
        - DEACTIVATE_PLUGIN
        - INSTALL_PLUGIN
        - DELETE_PLUGIN
        - DELETE_THEME
        - TOGGLE_MAINTENANCE
        - CLEAR_CACHE
        - OPTIMIZE_DATABASE
        - UPDATE_ROBOTS_TXT
        - UPDATE_HTACCESS
        - UPDATE_PHP_CONFIG
    IncidentStatus:
      type: string
      enum: [OPEN, RESOLVED, MUTED]
    NotificationChannelType:
      type: string
      enum: [EMAIL, TELEGRAM, SLACK, DISCORD, WEBHOOK]
    IntegrationProvider:
      type: string
      enum: [GOOGLE]
    IntegrationStatus:
      type: string
      enum: [ACTIVE, INACTIVE, EXPIRED, ERROR]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
    UpdateUserRequest:
      type: object
      properties:
        fullName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean
    Site:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        siteUrl:
          type: string
          format: uri
        environment:
          $ref: '#/components/schemas/EnvironmentType'
        wpVersion:
          type: string
          nullable: true
        phpVersion:
          type: string
          nullable: true
        wpAgentVersion:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/SiteStatus'
        connectionStatus:
          $ref: '#/components/schemas/ConnectionStatus'
        maintenanceMode:
          type: boolean
        ga4PropertyId:
          type: string
          nullable: true
        gscSiteUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateSiteRequest:
      type: object
      required: [name, domain, siteUrl]
      properties:
        name:
          type: string
        domain:
          type: string
        siteUrl:
          type: string
          format: uri
        environment:
          $ref: '#/components/schemas/EnvironmentType'
        timezone:
          type: string
        notes:
          type: string
    UpdateSiteRequest:
      type: object
      properties:
        name:
          type: string
        siteUrl:
          type: string
          format: uri
        environment:
          $ref: '#/components/schemas/EnvironmentType'
        status:
          $ref: '#/components/schemas/SiteStatus'
        timezone:
          type: string
        notes:
          type: string
    Plugin:
      type: object
      properties:
        id:
          type: string
        siteId:
          type: string
        slug:
          type: string
        name:
          type: string
        versionInstalled:
          type: string
        versionLatest:
          type: string
          nullable: true
        isActive:
          type: boolean
        isPremium:
          type: boolean
        autoUpdateEnabled:
          type: boolean
        updateAvailable:
          type: boolean
        sourceType:
          type: string
          nullable: true
        installedAt:
          type: string
          format: date-time
          nullable: true
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
    Theme:
      type: object
      properties:
        id:
          type: string
        siteId:
          type: string
        slug:
          type: string
        name:
          type: string
        versionInstalled:
          type: string
        versionLatest:
          type: string
          nullable: true
        isActive:
          type: boolean
        updateAvailable:
          type: boolean
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
    CoreVersion:
      type: object
      properties:
