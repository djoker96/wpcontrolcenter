openapi: 3.1.0
info:
  title: WP Control Center API
  version: 1.0.0
  description: >-
    REST API specification for the WP Control Center admin dashboard, worker
    orchestration layer, and WordPress agent integration.
servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:3001
    description: Local
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Sites
  - name: Site Inventory
  - name: Site Actions
  - name: Jobs
  - name: Monitoring
  - name: Analytics
  - name: Integrations
  - name: Notifications
  - name: Agent
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out current user
      responses:
        '204':
          description: Logged out
  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '202':
          description: Accepted
  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset complete
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/users:
    get:
      tags: [Users]
      summary: List users
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    patch:
      tags: [Users]
      summary: Update user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      tags: [Users]
      summary: Deactivate user
      responses:
        '204':
          description: User deactivated

  /api/sites:
    get:
      tags: [Sites]
      summary: List sites
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/SiteStatus'
        - in: query
          name: connectionStatus
          schema:
            $ref: '#/components/schemas/ConnectionStatus'
        - in: query
          name: hasUpdates
          schema:
            type: boolean
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: Sites list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Site'
    post:
      tags: [Sites]
      summary: Create site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequest'
      responses:
        '201':
          description: Site created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'

  /api/sites/{id}:
    parameters:
      - $ref: '#/components/parameters/SiteId'
    get:
      tags: [Sites]
      summary: Get site detail
      responses:
        '200':
          description: Site detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
    patch:
      tags: [Sites]
      summary: Update site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSiteRequest'
      responses:
        '200':
          description: Site updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
    delete:
      tags: [Sites]
      summary: Archive site
      responses:
        '204':
          description: Site archived

  /api/sites/{id}/generate-connection-token:
    post:
      tags: [Sites]
      summary: Generate one-time connection token for WordPress agent
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Connection token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time

  /api/sites/{id}/rotate-secret:
    post:
      tags: [Sites]
      summary: Rotate site secret keys
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Secret rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  publicKey:
                    type: string
                  rotatedAt:
                    type: string
                    format: date-time

  /api/sites/{id}/resync:
    post:
      tags: [Sites]
      summary: Queue full site resynchronization job
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '202':
          description: Resync job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/overview:
    get:
      tags: [Site Inventory]
      summary: Get overview panel data for a site
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Site overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteOverviewResponse'

  /api/sites/{id}/plugins:
    get:
      tags: [Site Inventory]
      summary: List plugins for a site
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Plugin list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plugin'

  /api/sites/{id}/themes:
    get:
      tags: [Site Inventory]
      summary: List themes for a site
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Theme list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Theme'

  /api/sites/{id}/core:
    get:
      tags: [Site Inventory]
      summary: Get WordPress core version status for a site
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Core version info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoreVersion'

  /api/sites/{id}/uptime:
    get:
      tags: [Monitoring]
      summary: Get recent uptime checks for a site
      parameters:
        - $ref: '#/components/parameters/SiteId'
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 90
      responses:
        '200':
          description: Uptime checks
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UptimeCheck'

  /api/sites/{id}/incidents:
    get:
      tags: [Monitoring]
      summary: Get incidents for a site
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Incident list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Incident'

  /api/sites/{id}/analytics:
    get:
      tags: [Analytics]
      summary: Get combined analytics overview for a site
      parameters:
        - $ref: '#/components/parameters/SiteId'
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteAnalyticsResponse'

  /api/sites/{id}/audit-logs:
    get:
      tags: [Sites]
      summary: Get audit logs for a site
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Audit log list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'

  /api/sites/{id}/actions/update-core:
    post:
      tags: [Site Actions]
      summary: Queue WordPress core update
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/update-plugin:
    post:
      tags: [Site Actions]
      summary: Queue plugin update
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/update-theme:
    post:
      tags: [Site Actions]
      summary: Queue theme update
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/activate-plugin:
    post:
      tags: [Site Actions]
      summary: Activate plugin
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/deactivate-plugin:
    post:
      tags: [Site Actions]
      summary: Deactivate plugin
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/install-plugin:
    post:
      tags: [Site Actions]
      summary: Install plugin from wordpress.org slug
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/delete-plugin:
    post:
      tags: [Site Actions]
      summary: Delete plugin
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/delete-theme:
    post:
      tags: [Site Actions]
      summary: Delete theme
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/toggle-maintenance:
    post:
      tags: [Site Actions]
      summary: Enable or disable maintenance mode
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/clear-cache:
    post:
      tags: [Site Actions]
      summary: Clear site cache through supported integrations
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/optimize-database:
    post:
      tags: [Site Actions]
      summary: Optimize WordPress database
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/update-robots:
    post:
      tags: [Site Actions]
      summary: Replace robots.txt content
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/update-htaccess:
    post:
      tags: [Site Actions]
      summary: Replace .htaccess content after snapshot
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/sites/{id}/actions/update-php-config:
    post:
      tags: [Site Actions]
      summary: Update supported PHP-related site config keys
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePhpConfigRequest'
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/jobs:
    get:
      tags: [Jobs]
      summary: List jobs
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/JobStatus'
        - in: query
          name: siteId
          schema:
            type: string
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'

  /api/jobs/{id}:
    parameters:
      - $ref: '#/components/parameters/JobId'
    get:
      tags: [Jobs]
      summary: Get job detail
      responses:
        '200':
          description: Job detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Job'
                  - type: object
                    properties:
                      logs:
                        type: array
                        items:
                          $ref: '#/components/schemas/JobLog'

  /api/jobs/{id}/retry:
    post:
      tags: [Jobs]
      summary: Retry failed job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '202':
          description: Retry queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobQueueResponse'

  /api/jobs/{id}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel queued or running job if supported
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '202':
          description: Cancel requested

  /api/monitoring/overview:
    get:
      tags: [Monitoring]
      summary: Monitoring summary across all sites
      responses:
        '200':
          description: Monitoring overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalSites:
                    type: integer
                  onlineSites:
                    type: integer
                  downSites:
                    type: integer
                  openIncidents:
                    type: integer
                  averageResponseTimeMs:
                    type: integer

  /api/monitoring/incidents:
    get:
      tags: [Monitoring]
      summary: List incidents
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/IncidentStatus'
      responses:
        '200':
          description: Incidents list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Incident'

  /api/monitoring/uptime-checks:
    get:
      tags: [Monitoring]
      summary: List recent uptime checks across sites
      responses:
        '200':
          description: Uptime checks list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UptimeCheck'

  /api/analytics/overview:
    get:
      tags: [Analytics]
      summary: Analytics summary across all sites
      parameters:
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Analytics overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  totals:
                    type: object
                    properties:
                      sessions:
                        type: integer
                      users:
                        type: integer
                      pageviews:
                        type: integer
                      clicks:
                        type: integer
                      impressions:
                        type: integer

  /api/analytics/sites/{id}/ga4:
    get:
      tags: [Analytics]
      summary: Get GA4 analytics data for site
      parameters:
        - $ref: '#/components/parameters/SiteId'
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: GA4 data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSeriesResponse'

  /api/analytics/sites/{id}/gsc:
    get:
      tags: [Analytics]
      summary: Get Search Console analytics data for site
      parameters:
        - $ref: '#/components/parameters/SiteId'
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: GSC data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSeriesResponse'

  /api/integrations/google/connect:
    post:
      tags: [Integrations]
      summary: Start Google OAuth flow
      responses:
        '200':
          description: OAuth URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorizationUrl:
                    type: string
                    format: uri

  /api/integrations/google/callback:
    post:
      tags: [Integrations]
      summary: Complete Google OAuth callback and save tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                state:
                  type: string
      responses:
        '200':
          description: Integration connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationAccount'

  /api/integrations:
    get:
      tags: [Integrations]
      summary: List integration accounts
      responses:
        '200':
          description: Integration accounts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IntegrationAccount'

  /api/sites/{id}/integrations/ga4:
    post:
      tags: [Integrations]
      summary: Attach GA4 property to site
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [integrationAccountId, externalPropertyId]
              properties:
                integrationAccountId:
                  type: string
                externalPropertyId:
                  type: string
      responses:
        '200':
          description: Site integration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteIntegration'

  /api/sites/{id}/integrations/gsc:
    post:
      tags: [Integrations]
      summary: Attach Search Console property to site
      parameters:
        - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [integrationAccountId, externalSiteIdentifier]
              properties:
                integrationAccountId:
                  type: string
                externalSiteIdentifier:
                  type: string
      responses:
        '200':
          description: Site integration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteIntegration'

  /api/notifications/channels:
    get:
      tags: [Notifications]
      summary: List notification channels
      responses:
        '200':
          description: Notification channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationChannel'
    post:
      tags: [Notifications]
      summary: Create notification channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationChannelRequest'
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationChannel'

  /api/notifications/channels/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    patch:
