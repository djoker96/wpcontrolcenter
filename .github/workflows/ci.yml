name: CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

# Concurrency: cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PRISMA_SCHEMA: packages/database/prisma/schema.prisma
  COMPOSE_FILE: docker-compose.prod.yml
  COMPOSE_ENV: .env.ci

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1/4 — Static checks (parallel with unit-tests)
  # ─────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=${{ env.PRISMA_SCHEMA }}

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2/4 — Unit tests (parallel with code-quality)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=${{ env.PRISMA_SCHEMA }}

      - name: Build internal packages
        run: |
          npm run build -w packages/shared
          npm run build -w packages/database

      - name: Run unit tests
        run: npm test --workspaces --if-present

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3/4 — Build verification (gate for e2e-tests)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=${{ env.PRISMA_SCHEMA }}

      - name: Build all workspaces
        run: npm run build:all

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4/4 — E2E tests against the full Docker stack
  # ─────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate CI environment file
        run: |
          cat > ${{ env.COMPOSE_ENV }} <<'EOF'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=ci_test_password
          POSTGRES_DB=wp_control_center
          DATABASE_URL=postgresql://postgres:ci_test_password@postgres:5432/wp_control_center?schema=public
          REDIS_HOST=redis
          REDIS_PORT=6379
          JWT_SECRET=ci-jwt-secret-for-testing-only
          JWT_EXPIRES_IN=1d
          AGENT_ENCRYPTION_KEY=6a66632c253d82a17cb0b51de38e8cb554c8651a24d852a35368a5436d4f9bf3
          UPTIME_CHECK_INTERVAL_SECONDS=300
          EOF
          sed -i 's/^[[:space:]]*//' ${{ env.COMPOSE_ENV }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Stack
        run: docker compose --env-file ${{ env.COMPOSE_ENV }} -f ${{ env.COMPOSE_FILE }} build

      - name: Start Stack
        run: docker compose --env-file ${{ env.COMPOSE_ENV }} -f ${{ env.COMPOSE_FILE }} up -d

      - name: Wait for Postgres
        run: |
          timeout 60s sh -c \
            'until docker compose --env-file ${{ env.COMPOSE_ENV }} -f ${{ env.COMPOSE_FILE }} exec -T postgres pg_isready -U postgres; do sleep 2; done'

      - name: Run Migrations
        run: |
          docker compose --env-file ${{ env.COMPOSE_ENV }} -f ${{ env.COMPOSE_FILE }} exec -T api \
            npx prisma migrate deploy --schema=${{ env.PRISMA_SCHEMA }}

      - name: Seed Database
        run: |
          docker compose --env-file ${{ env.COMPOSE_ENV }} -f ${{ env.COMPOSE_FILE }} exec -T api \
            node packages/database/dist/seed.js

      - name: Wait for Nginx Gateway (HTTP 200)
        run: |
          timeout 120s sh -c \
            'until [ "$(curl -s -o /dev/null -w "%{http_code}" http://localhost)" = "200" ]; do echo "Still waiting..."; sleep 3; done'

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox
        working-directory: apps/web

      - name: Run Playwright E2E Tests
        run: BASE_URL=http://localhost npx playwright test --no-deps
        working-directory: apps/web

      - name: Stop Stack
        if: always()
        run: docker compose --env-file ${{ env.COMPOSE_ENV }} -f ${{ env.COMPOSE_FILE }} down -v

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
