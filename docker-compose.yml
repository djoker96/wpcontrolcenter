version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wpcc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecretPassword123!}
      POSTGRES_DB: ${POSTGRES_DB:-wp_control_center}
    # Bind to loopback only — never expose the DB on a non-local interface.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: wpcc-redis
    # Bind to loopback only. For any shared/prod host also enable auth:
    #   command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
